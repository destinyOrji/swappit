name: swappit
description: Swappit - Skill Trading Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0

  # Storage (works on web + mobile)
  shared_preferences: ^2.2.2

  # Image handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0

  # Socket.io
  socket_io_client: ^2.0.3+1

  # UI
  shimmer: ^3.0.0
  pinput: ^3.0.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

name: swappit
description: Swappit - Skill Trading Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # Google Sign In
  google_sign_in: ^6.1.6

  # Firebase (Push notifications)
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

  # Image handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0

  # Socket.io
  socket_io_client: ^2.0.3+1

  # UI
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  pinput: ^3.0.1
  country_code_picker: ^3.0.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  permission_handler: ^11.2.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
